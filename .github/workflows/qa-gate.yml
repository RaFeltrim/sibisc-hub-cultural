name: QA Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: qa-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  p0-repository-guard:
    name: P0 Repository Guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SIBiSC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SIBiSC/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run repository guard
        run: npm run qa:repo

  p1-frontend-build:
    name: P1 Frontend Build
    runs-on: ubuntu-latest
    needs: p0-repository-guard
    defaults:
      run:
        working-directory: SIBiSC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SIBiSC/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sibisc-dist
          path: SIBiSC/dist
